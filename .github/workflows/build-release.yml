name: Build & Release

# Every push to main builds unsigned IPA + Mac Catalyst DMG and publishes a
# GitHub Release (with tag) that attaches both artifacts.
# Version is auto-bumped from MARKETING_VERSION so each release gets a unique tag;
# you do not need to bump versions manually.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # tags for version computation, full history for build number

      # macos-15 still defaults to Xcode 16.4, which has no UIGlassEffect (iOS 26 SDK).
      # App code uses Liquid Glass APIs — must build with Xcode 26.x.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      # Pin SwiftLint so a newer runner linter cannot fail --strict build phases.
      # Packaging scripts also default SKIP_SWIFTLINT=1 as a belt-and-suspenders.
      - name: Pin SwiftLint 0.63.3
        run: |
          curl -sL -o "$RUNNER_TEMP/swiftlint.zip" \
            https://github.com/realm/SwiftLint/releases/download/0.63.3/portable_swiftlint.zip
          unzip -oq "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/swiftlint"
          sudo install -m 755 "$RUNNER_TEMP/swiftlint/swiftlint" "$(brew --prefix)/bin/swiftlint"
          swiftlint version

      - name: Configure local build settings
        run: cp Config/Local.xcconfig.example Config/Local.xcconfig

      - name: Compute release version
        id: version
        run: |
          git fetch --tags --force --quiet
          MARKETING=$(sed -n 's/.*MARKETING_VERSION = \([^;]*\);.*/\1/p' \
            YTLite.xcodeproj/project.pbxproj | head -1)
          MAJOR_MINOR=$(echo "$MARKETING" | cut -d. -f1,2)
          PATCH=$(echo "$MARKETING" | cut -d. -f3)
          PATCH=${PATCH:-0}
          VERSION="$MAJOR_MINOR.$PATCH"
          # MARKETING_VERSION is a floor: while its tag already exists, bump patch.
          while git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; do
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR_MINOR.$PATCH"
          done
          BUILD=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version $VERSION, build $BUILD (project has $MARKETING)"

      - name: Build IPA
        env:
          IPA_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          XCODEBUILD_EXTRA_ARGS: CODE_SIGNING_ALLOWED=NO
        run: ./make_ipa.sh

      - name: Build DMG (Mac Catalyst)
        env:
          DMG_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
        run: ./make_dmg.sh

      - name: Publish release with IPA + DMG
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IPA="YTLite_${VERSION}.ipa"
          DMG="YTLite_${VERSION}_macOS.dmg"
          test -f "$IPA" || { echo "missing $IPA"; ls -la; exit 1; }
          test -f "$DMG" || { echo "missing $DMG"; ls -la; exit 1; }

          # Drop a leftover draft for this tag if any (published tags never match).
          gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq ".[] | select(.draft and .tag_name == \"$VERSION\") | .id" |
            while read -r id; do
              echo "Deleting stale draft release $id"
              gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
            done

          # Published release + git tag. Assets: IPA + DMG.
          gh release create "$VERSION" "$IPA" "$DMG" \
            --title "$VERSION" \
            --generate-notes \
            --target "$GITHUB_SHA"
          echo "Published release $VERSION with $IPA and $DMG"
